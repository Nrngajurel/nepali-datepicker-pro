<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nepali Date Range Picker</title>

<!--
  Third-party BS<->AD conversion engine (CDN). This is the ONLY external
  dependency. Everything else — domain logic, state machine, rendering,
  styling — is in this single file, no build step, no framework.
  Docs: https://nepalidatepicker.sajanmaharjan.com.np/v5/
-->
<script src="https://nepalidatepicker.sajanmaharjan.com.np/v5/nepali.datepicker/js/nepali.datepicker.v5.0.6.min.js"></script>

<style>
  :root {
    --ndrp-green: #3aa856;
    --ndrp-green-dark: #339349;
    --ndrp-green-bg: #eaf7ec;
    --ndrp-green-text: #2f9c48;
    --ndrp-border: #e3e6ea;
    --ndrp-text: #33383d;
    --ndrp-text-muted: #8a9099;
    --ndrp-text-faint: #c7ccd1;
    --ndrp-white: #ffffff;
    --ndrp-radius: 6px;
    --ndrp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Devanagari', Arial, sans-serif;
    --ndrp-shadow: 0 8px 24px rgba(20, 30, 40, 0.14);
  }

  body { font-family: var(--ndrp-font); background: #f4f5f6; padding: 60px; }

  .ndrp, .ndrp * { box-sizing: border-box; }
  .ndrp { font-family: var(--ndrp-font); color: var(--ndrp-text); font-size: 14px; position: relative; display: inline-block; }

  .ndrp-trigger {
    all: unset; cursor: pointer; display: inline-flex; gap: 8px; align-items: center;
    border: 1px solid var(--ndrp-border); border-radius: var(--ndrp-radius);
    padding: 9px 14px; background: var(--ndrp-white); font-variant-numeric: tabular-nums;
  }
  .ndrp-trigger:focus-visible { outline: 2px solid var(--ndrp-green); outline-offset: 2px; }

  .ndrp-panel-root { position: absolute; top: calc(100% + 6px); left: 0; z-index: 1000; }
  .ndrp-panel {
    display: flex; background: var(--ndrp-white); border: 1px solid var(--ndrp-border);
    border-radius: var(--ndrp-radius); box-shadow: var(--ndrp-shadow); width: 640px; overflow: hidden;
  }

  /* ---- Left preset rail ---- */
  .ndrp-presets { width: 200px; border-right: 1px solid var(--ndrp-border); padding: 8px 0; display: flex; flex-direction: column; }
  .ndrp-preset { all: unset; display: block; padding: 10px 18px; cursor: pointer; color: var(--ndrp-text); }
  .ndrp-preset:hover { background: #f4f6f7; }
  .ndrp-preset.is-active { background: var(--ndrp-green-bg); color: var(--ndrp-green-text); font-weight: 600; }
  .ndrp-preset--submenu { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .ndrp-chevron { color: var(--ndrp-text-muted); }
  .ndrp-submenu-list { padding: 4px 0 4px 18px; }
  .ndrp-submenu-item { all: unset; display: block; width: calc(100% - 18px); padding: 6px 18px; cursor: pointer; color: var(--ndrp-text-muted); }
  .ndrp-submenu-item:hover { background: #f4f6f7; color: var(--ndrp-text); }

  /* ---- Right calendar column ---- */
  .ndrp-cal-col { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  .ndrp-inputs-row { display: flex; align-items: center; gap: 8px; }
  .ndrp-input { flex: 1; border: 1px solid var(--ndrp-border); border-radius: var(--ndrp-radius); padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; font-variant-numeric: tabular-nums; }
  .ndrp-input-icon { font-size: 12px; opacity: 0.6; }

  .ndrp-mode-switch { position: relative; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; flex-shrink: 0; }
  .ndrp-mode-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .ndrp-mode-track { width: 34px; height: 18px; border-radius: 999px; background: var(--ndrp-border); position: relative; transition: background .15s ease; flex-shrink: 0; }
  .ndrp-mode-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--ndrp-white); transition: transform .15s ease; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
  .ndrp-mode-switch input:checked + .ndrp-mode-track { background: var(--ndrp-green); }
  .ndrp-mode-switch input:checked + .ndrp-mode-track::after { transform: translateX(16px); }
  .ndrp-mode-label { font-size: 11px; font-weight: 700; color: var(--ndrp-text-muted); width: 18px; }

  .ndrp-cal-header { background: var(--ndrp-green); color: var(--ndrp-white); border-radius: var(--ndrp-radius); display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
  .ndrp-nav { all: unset; cursor: pointer; padding: 4px 8px; font-size: 14px; }
  .ndrp-nav:hover { background: rgba(255,255,255,.15); border-radius: 4px; }
  .ndrp-cal-label { text-align: center; line-height: 1.3; }
  .ndrp-cal-label-primary { font-weight: 700; font-size: 15px; }
  .ndrp-cal-label-secondary { font-size: 11px; opacity: .85; }

  .ndrp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
  .ndrp-weekday { font-size: 12px; font-weight: 600; color: var(--ndrp-text-muted); padding: 4px 0; }

  .ndrp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .ndrp-cell { all: unset; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 44px; cursor: pointer; border-radius: 4px; text-align: center; }
  .ndrp-cell--empty { cursor: default; }
  .ndrp-cell:hover:not(.ndrp-cell--empty) { background: var(--ndrp-green-bg); }
  .ndrp-cell-primary { font-size: 14px; font-weight: 600; }
  .ndrp-cell-secondary { font-size: 9px; color: var(--ndrp-text-faint); }
  .ndrp-cell.is-in-range { background: var(--ndrp-green-bg); border-radius: 0; }
  .ndrp-cell.is-range-start, .ndrp-cell.is-range-end, .ndrp-cell.is-pending-start { background: var(--ndrp-green); border-radius: 4px; }
  .ndrp-cell.is-range-start .ndrp-cell-primary, .ndrp-cell.is-range-end .ndrp-cell-primary, .ndrp-cell.is-pending-start .ndrp-cell-primary { color: var(--ndrp-white); }
  .ndrp-cell.is-range-start .ndrp-cell-secondary, .ndrp-cell.is-range-end .ndrp-cell-secondary, .ndrp-cell.is-pending-start .ndrp-cell-secondary { color: rgba(255,255,255,.8); }
  .ndrp-cell.is-today:not(.is-range-start):not(.is-range-end) .ndrp-cell-primary { color: var(--ndrp-green-text); }

  .ndrp-apply { all: unset; box-sizing: border-box; width: 100%; text-align: center; background: var(--ndrp-green); color: var(--ndrp-white); font-weight: 700; letter-spacing: .04em; padding: 10px 0; border-radius: var(--ndrp-radius); cursor: pointer; }
  .ndrp-apply:hover { background: var(--ndrp-green-dark); }

  @media (max-width: 520px) {
    .ndrp-panel { flex-direction: column; width: 320px; }
    .ndrp-presets { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--ndrp-border); }
  }
</style>
</head>
<body>

  <!-- Mount point. Multiple pickers on one page just need distinct containers. -->
  <div id="my-date-range-picker"></div>

  <script>
  (function () {
    'use strict';

    /* =========================================================================
     * CONFIG — the only section you should need to touch per integration.
     * ===================================================================== */
    var NDRP_CONFIG = {
      mode: 'BS',                 // 'BS' | 'AD' — initial calendar system
      fiscalStartMonth: 4,        // Shrawan = 1st month of Nepali fiscal year
      defaultPresetId: 'last7',   // which preset is pre-selected on load
      weekStartsOn: 0,            // 0 = Sunday, matches आइत-first layout
      presets: {                  // toggle which presets appear, top to bottom
        today: true, last7: true, last15: true, last30: true,
        last45: true, last60: true, fiscalYearToDate: true, fiscalYear: true, custom: true,
      },
      fiscalYearLookback: 5,      // how many years back the "Fiscal Year" submenu lists
    };

    /* =========================================================================
     * DOMAIN — pure value objects. No DOM, no library calls.
     * ===================================================================== */
    function createDateValue(bsYear, bsMonth, bsDay, adDate) {
      if (!(adDate instanceof Date) || isNaN(adDate.getTime())) {
        throw new TypeError('DateValue requires a valid adDate');
      }
      return Object.freeze({
        bsYear: bsYear, bsMonth: bsMonth, bsDay: bsDay,
        adDate: new Date(adDate.getFullYear(), adDate.getMonth(), adDate.getDate()),
      });
    }
    function isSameDay(a, b) { return a.adDate.getTime() === b.adDate.getTime(); }
    function compareDateValue(a, b) { return a.adDate.getTime() - b.adDate.getTime(); }
    function isBefore(a, b) { return compareDateValue(a, b) < 0; }

    function createDateRange(start, end) {
      var ordered = compareDateValue(start, end) <= 0 ? [start, end] : [end, start];
      return Object.freeze({ start: ordered[0], end: ordered[1] });
    }
    function isWithinRange(range, date) {
      return date.adDate.getTime() >= range.start.adDate.getTime()
        && date.adDate.getTime() <= range.end.adDate.getTime();
    }
    function rangeEquals(a, b) {
      if (!a || !b) return a === b;
      return a.start.adDate.getTime() === b.start.adDate.getTime()
        && a.end.adDate.getTime() === b.end.adDate.getTime();
    }

    /* =========================================================================
     * ADAPTERS — the DI boundary. Controller only ever talks to this shape:
     *   { adToBs, bsToAd, daysInBsMonth, todayBs, bsMonthNames, bsWeekdayShort, toDevanagariDigits }
     * Swap createNepaliFunctionsAdapter() for a different implementation
     * (e.g. a vendored conversion table) without touching controller/render.
     * ===================================================================== */
    function normalizeBs(raw) {
      if (raw && typeof raw === 'object' && 'year' in raw) {
        return { year: +raw.year, month: +raw.month, day: +raw.day };
      }
      if (typeof raw === 'string') {
        var parts = raw.split(/[-/]/).map(Number);
        if (parts.length === 3 && parts.every(function (n) { return !isNaN(n); })) {
          return { year: parts[0], month: parts[1], day: parts[2] };
        }
      }
      throw new Error(
        '[NepaliDateRangePicker] Unrecognized BS date shape from NepaliFunctions. '
        + 'Run _probeNepaliFunctions() in devtools and update normalizeBs() to match the real return value.'
      );
    }

    function createNepaliFunctionsAdapter() {
      var NF = window.NepaliFunctions;
      if (!NF) {
        throw new Error(
          '[NepaliDateRangePicker] window.NepaliFunctions not found. '
          + 'Make sure the nepali.datepicker CDN <script> tag loaded before this script runs.'
        );
      }
      return {
        adToBs: function (adDate) { return normalizeBs(NF.AD2BS(adDate)); },
        bsToAd: function (bsYear, bsMonth, bsDay) {
          var iso = bsYear + '-' + String(bsMonth).padStart(2, '0') + '-' + String(bsDay).padStart(2, '0');
          var raw = NF.BS2AD(iso);
          var d = raw instanceof Date ? raw : new Date(raw);
          if (isNaN(d.getTime())) throw new Error('[NepaliDateRangePicker] BS2AD(\'' + iso + '\') did not return a valid date');
          return d;
        },
        daysInBsMonth: function (bsYear, bsMonth) { return Number(NF.BS.GetDaysInMonth(bsYear, bsMonth)); },
        todayBs: function () { return normalizeBs(NF.BS.GetCurrentDate()); },
        bsMonthNames: typeof NF.BS.GetMonthsInUnicode === 'function' ? NF.BS.GetMonthsInUnicode() : [],
        bsWeekdayShort: typeof NF.BS.GetDaysUnicodeShort === 'function' ? NF.BS.GetDaysUnicodeShort() : [],
        toDevanagariDigits: function (n) { return typeof NF.ConvertToUnicode === 'function' ? NF.ConvertToUnicode(n) : String(n); },
      };
    }

    // One-time console probe — run against the real CDN script, confirm shapes, then ignore.
    window._probeNepaliFunctions = function () {
      var NF = window.NepaliFunctions;
      console.log('AD2BS(new Date()) =>', NF.AD2BS(new Date()));
      console.log('BS.GetCurrentDate() =>', NF.BS.GetCurrentDate());
      console.log('BS.GetMonthsInUnicode() =>', NF.BS.GetMonthsInUnicode && NF.BS.GetMonthsInUnicode());
      console.log('BS.GetDaysUnicodeShort() =>', NF.BS.GetDaysUnicodeShort && NF.BS.GetDaysUnicodeShort());
    };

    function createGregorianAdapter() {
      var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var WEEKDAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return {
        monthNames: MONTH_NAMES,
        weekdayShort: WEEKDAY_SHORT,
        daysInMonth: function (year, month) { return new Date(year, month, 0).getDate(); },
        firstWeekday: function (year, month) { return new Date(year, month - 1, 1).getDay(); },
      };
    }

    /* =========================================================================
     * APPLICATION — presets + state machine. No DOM.
     * ===================================================================== */
    function dateValueFromAd(adapter, adDate) {
      var bs = adapter.adToBs(adDate);
      return createDateValue(bs.year, bs.month, bs.day, adDate);
    }
    function addAdDays(adDate, days) {
      var d = new Date(adDate);
      d.setDate(d.getDate() + days);
      return d;
    }
    function lastNDaysRange(adapter, todayDv, n) {
      return createDateRange(dateValueFromAd(adapter, addAdDays(todayDv.adDate, -n)), todayDv);
    }
    function fiscalYearStartFor(bsYear, bsMonth) {
      return bsMonth >= NDRP_CONFIG.fiscalStartMonth ? bsYear : bsYear - 1;
    }
    function fiscalYearRange(adapter, fyStartYear) {
      var start = createDateValue(fyStartYear, NDRP_CONFIG.fiscalStartMonth, 1,
        adapter.bsToAd(fyStartYear, NDRP_CONFIG.fiscalStartMonth, 1));
      var endYear = fyStartYear + 1;
      var endMonth = NDRP_CONFIG.fiscalStartMonth - 1 || 12;
      var endDay = adapter.daysInBsMonth(endYear, endMonth);
      var end = createDateValue(endYear, endMonth, endDay, adapter.bsToAd(endYear, endMonth, endDay));
      return createDateRange(start, end);
    }

    function buildPresets(adapter) {
      var todayBs = adapter.todayBs();
      var todayDv = createDateValue(todayBs.year, todayBs.month, todayBs.day,
        adapter.bsToAd(todayBs.year, todayBs.month, todayBs.day));
      var fyStart = fiscalYearStartFor(todayBs.year, todayBs.month);
      var cfg = NDRP_CONFIG.presets;
      var list = [];

      if (cfg.today) list.push({ id: 'today', label: 'Today', kind: 'range', resolve: function () { return createDateRange(todayDv, todayDv); } });
      if (cfg.last7) list.push({ id: 'last7', label: 'Last 7 days', kind: 'range', resolve: function () { return lastNDaysRange(adapter, todayDv, 7); } });
      if (cfg.last15) list.push({ id: 'last15', label: 'Last 15 days', kind: 'range', resolve: function () { return lastNDaysRange(adapter, todayDv, 15); } });
      if (cfg.last30) list.push({ id: 'last30', label: 'Last 30 days', kind: 'range', resolve: function () { return lastNDaysRange(adapter, todayDv, 30); } });
      if (cfg.last45) list.push({ id: 'last45', label: 'Last 45 days', kind: 'range', resolve: function () { return lastNDaysRange(adapter, todayDv, 45); } });
      if (cfg.last60) list.push({ id: 'last60', label: 'Last 60 days', kind: 'range', resolve: function () { return lastNDaysRange(adapter, todayDv, 60); } });
      if (cfg.fiscalYearToDate) {
        list.push({
          id: 'fytd', label: 'This Fiscal Year to Date', kind: 'range',
          resolve: function () {
            var start = createDateValue(fyStart, NDRP_CONFIG.fiscalStartMonth, 1,
              adapter.bsToAd(fyStart, NDRP_CONFIG.fiscalStartMonth, 1));
            return createDateRange(start, todayDv);
          },
        });
      }
      if (cfg.fiscalYear) {
        var items = [];
        for (var back = 0; back < NDRP_CONFIG.fiscalYearLookback; back++) {
          (function (y) {
            items.push({
              id: 'fy-' + y,
              label: y + '/' + String((y + 1) % 100).padStart(2, '0') + ' BS',
              resolve: function () { return fiscalYearRange(adapter, y); },
            });
          })(fyStart - back);
        }
        list.push({ id: 'fiscalYear', label: 'Fiscal Year', kind: 'submenu', items: items });
      }
      if (cfg.custom) list.push({ id: 'custom', label: 'Custom Range', kind: 'submenu', items: [] });

      return list;
    }

    function createController(adapter) {
      var listeners = [];
      var presets = buildPresets(adapter);
      var todayBs = adapter.todayBs();
      var todayDv = createDateValue(todayBs.year, todayBs.month, todayBs.day,
        adapter.bsToAd(todayBs.year, todayBs.month, todayBs.day));

      var defaultPreset = presets.filter(function (p) { return p.id === NDRP_CONFIG.defaultPresetId; })[0]
        || presets.filter(function (p) { return p.kind === 'range'; })[0];
      var initialRange = defaultPreset ? defaultPreset.resolve() : createDateRange(todayDv, todayDv);

      var state = {
        isOpen: false,
        mode: NDRP_CONFIG.mode === 'AD' ? 'AD' : 'BS',
        viewYear: initialRange.end.bsYear,
        viewMonth: initialRange.end.bsMonth,
        range: initialRange,
        pendingStart: null,
        hoverDate: null,
        activePresetId: defaultPreset ? defaultPreset.id : null,
        openSubmenuId: null,
        lastApplied: null,
      };

      function emit() { listeners.forEach(function (fn) { fn(state); }); }
      function setState(patch) { state = Object.assign({}, state, patch); emit(); }

      return {
        getState: function () { return state; },
        getPresets: function () { return presets; },
        getToday: function () { return todayDv; },
        getAdapter: function () { return adapter; },
        onChange: function (fn) { listeners.push(fn); return function () { listeners = listeners.filter(function (f) { return f !== fn; }); }; },

        open: function () {
          if (state.isOpen) return;
          var anchor = state.range ? state.range.end : todayDv;
          setState({ isOpen: true, viewYear: anchor.bsYear, viewMonth: anchor.bsMonth });
        },
        close: function () { setState({ isOpen: false, pendingStart: null, hoverDate: null, openSubmenuId: null }); },
        toggleMode: function () { setState({ mode: state.mode === 'BS' ? 'AD' : 'BS' }); },

        navigateMonth: function (delta) {
          var y = state.viewYear, m = state.viewMonth + delta;
          if (m > 12) { m = 1; y += 1; }
          if (m < 1) { m = 12; y -= 1; }
          setState({ viewYear: y, viewMonth: m });
        },
        navigateYear: function (delta) { setState({ viewYear: state.viewYear + delta }); },
        hoverDay: function (dv) { if (state.pendingStart) setState({ hoverDate: dv }); },

        selectDay: function (dv) {
          if (!state.pendingStart) {
            setState({ pendingStart: dv, range: null, activePresetId: null, hoverDate: null });
            return;
          }
          var range = isBefore(dv, state.pendingStart) ? createDateRange(dv, state.pendingStart) : createDateRange(state.pendingStart, dv);
          setState({ range: range, pendingStart: null, hoverDate: null });
        },
        selectPreset: function (presetId) {
          var preset = presets.filter(function (p) { return p.id === presetId; })[0];
          if (!preset || preset.kind !== 'range') return;
          var range = preset.resolve();
          setState({ range: range, activePresetId: presetId, pendingStart: null, hoverDate: null, viewYear: range.end.bsYear, viewMonth: range.end.bsMonth, openSubmenuId: null });
        },
        selectSubmenuItem: function (submenuId, itemId) {
          var submenu = presets.filter(function (p) { return p.id === submenuId; })[0];
          var item = submenu && submenu.items.filter(function (i) { return i.id === itemId; })[0];
          if (!item) return;
          var range = item.resolve();
          setState({ range: range, activePresetId: itemId, pendingStart: null, hoverDate: null, viewYear: range.end.bsYear, viewMonth: range.end.bsMonth, openSubmenuId: null });
        },
        toggleSubmenu: function (submenuId) { setState({ openSubmenuId: state.openSubmenuId === submenuId ? null : submenuId }); },

        apply: function (onApply) {
          if (!state.range) return;
          var changed = !rangeEquals(state.range, state.lastApplied);
          setState({ isOpen: false, lastApplied: state.range, openSubmenuId: null });
          if (changed) onApply(state.range);
        },
        cancel: function () { setState({ isOpen: false, pendingStart: null, hoverDate: null, openSubmenuId: null }); },
      };
    }

    /* =========================================================================
     * RENDER — pure DOM builder. Rebuild-on-change; simple and correct.
     * ===================================================================== */
    var gregorian = createGregorianAdapter();

    function el(tag, className, attrs) {
      var node = document.createElement(tag);
      if (className) node.className = className;
      attrs = attrs || {};
      Object.keys(attrs).forEach(function (k) {
        if (k === 'text') node.textContent = attrs[k];
        else node.setAttribute(k, attrs[k]);
      });
      return node;
    }
    function pad2(n) { return String(n).padStart(2, '0'); }
    function formatDate(dv, mode) {
      if (!dv) return '';
      if (mode === 'BS') return pad2(dv.bsDay) + '-' + pad2(dv.bsMonth) + '-' + dv.bsYear;
      var d = dv.adDate;
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function buildBsMonthCells(adapter, viewYear, viewMonth) {
      var daysInMonth = adapter.daysInBsMonth(viewYear, viewMonth);
      var firstAd = adapter.bsToAd(viewYear, viewMonth, 1);
      var leading = firstAd.getDay();
      var cells = [];
      for (var i = 0; i < leading; i++) cells.push(null);
      for (var day = 1; day <= daysInMonth; day++) {
        cells.push(createDateValue(viewYear, viewMonth, day, adapter.bsToAd(viewYear, viewMonth, day)));
      }
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    }
    function buildAdMonthCells(adapter, viewYear, viewMonth) {
      var daysInMonth = gregorian.daysInMonth(viewYear, viewMonth);
      var leading = gregorian.firstWeekday(viewYear, viewMonth);
      var cells = [];
      for (var i = 0; i < leading; i++) cells.push(null);
      for (var day = 1; day <= daysInMonth; day++) {
        var adDate = new Date(viewYear, viewMonth - 1, day);
        var bs = adapter.adToBs(adDate);
        cells.push(createDateValue(bs.year, bs.month, bs.day, adDate));
      }
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    }

    function renderPresets(state, presets, controller) {
      var col = el('div', 'ndrp-presets');
      presets.forEach(function (preset) {
        if (preset.kind === 'range') {
          var active = state.activePresetId === preset.id;
          var btn = el('button', 'ndrp-preset' + (active ? ' is-active' : ''), { type: 'button', text: preset.label });
          btn.addEventListener('click', function () { controller.selectPreset(preset.id); });
          col.appendChild(btn);
        } else {
          var isOpen = state.openSubmenuId === preset.id;
          var wrap = el('div', 'ndrp-preset-submenu');
          var sbtn = el('button', 'ndrp-preset ndrp-preset--submenu' + (isOpen ? ' is-open' : ''), { type: 'button' });
          sbtn.appendChild(el('span', null, { text: preset.label }));
          sbtn.appendChild(el('span', 'ndrp-chevron', { text: '\u203A' }));
          sbtn.addEventListener('click', function () { controller.toggleSubmenu(preset.id); });
          wrap.appendChild(sbtn);
          if (isOpen && preset.items.length) {
            var list = el('div', 'ndrp-submenu-list');
            preset.items.forEach(function (item) {
              var ibtn = el('button', 'ndrp-submenu-item', { type: 'button', text: item.label });
              ibtn.addEventListener('click', function () { controller.selectSubmenuItem(preset.id, item.id); });
              list.appendChild(ibtn);
            });
            wrap.appendChild(list);
          }
          col.appendChild(wrap);
        }
      });
      return col;
    }

    function renderInputsRow(state, controller) {
      var row = el('div', 'ndrp-inputs-row');
      var startInput = el('div', 'ndrp-input');
      startInput.appendChild(el('span', null, { text: formatDate(state.range && state.range.start, state.mode) || '\u00A0' }));
      startInput.appendChild(el('span', 'ndrp-input-icon', { text: '\uD83D\uDCC5' }));
      row.appendChild(startInput);

      var endInput = el('div', 'ndrp-input');
      endInput.appendChild(el('span', null, { text: formatDate(state.range && state.range.end, state.mode) || '\u00A0' }));
      endInput.appendChild(el('span', 'ndrp-input-icon', { text: '\uD83D\uDCC5' }));
      row.appendChild(endInput);

      var switchWrap = el('label', 'ndrp-mode-switch');
      var checkbox = el('input', null, { type: 'checkbox' });
      checkbox.checked = state.mode === 'AD';
      checkbox.addEventListener('change', function () { controller.toggleMode(); });
      switchWrap.appendChild(checkbox);
      switchWrap.appendChild(el('span', 'ndrp-mode-track'));
      switchWrap.appendChild(el('span', 'ndrp-mode-label', { text: state.mode }));
      row.appendChild(switchWrap);

      return row;
    }

    function renderCalendarHeader(state, controller) {
      var adapter = controller.getAdapter();
      var header = el('div', 'ndrp-cal-header');

      var prevYear = el('button', 'ndrp-nav', { type: 'button', text: '\u00AB' });
      prevYear.addEventListener('click', function () { controller.navigateYear(-1); });
      var prevMonth = el('button', 'ndrp-nav', { type: 'button', text: '\u2039' });
      prevMonth.addEventListener('click', function () { controller.navigateMonth(-1); });
      var nextMonth = el('button', 'ndrp-nav', { type: 'button', text: '\u203A' });
      nextMonth.addEventListener('click', function () { controller.navigateMonth(1); });
      var nextYear = el('button', 'ndrp-nav', { type: 'button', text: '\u00BB' });
      nextYear.addEventListener('click', function () { controller.navigateYear(1); });

      var label = el('div', 'ndrp-cal-label');
      if (state.mode === 'BS') {
        var monthName = adapter.bsMonthNames[state.viewMonth - 1] || ('Month ' + state.viewMonth);
        var yearDigits = adapter.toDevanagariDigits(state.viewYear);
        label.appendChild(el('div', 'ndrp-cal-label-primary', { text: monthName + ' ' + yearDigits }));
        var adFirst = adapter.bsToAd(state.viewYear, state.viewMonth, 1);
        label.appendChild(el('div', 'ndrp-cal-label-secondary', { text: adFirst.toLocaleString('en-US', { month: 'short', year: 'numeric' }) }));
      } else {
        label.appendChild(el('div', 'ndrp-cal-label-primary', { text: gregorian.monthNames[state.viewMonth - 1] + ' ' + state.viewYear }));
      }

      header.appendChild(prevYear); header.appendChild(prevMonth);
      header.appendChild(label);
      header.appendChild(nextMonth); header.appendChild(nextYear);
      return header;
    }

    function renderWeekdays(state, adapter) {
      var row = el('div', 'ndrp-weekdays');
      var labels = state.mode === 'BS'
        ? (adapter.bsWeekdayShort.length ? adapter.bsWeekdayShort : ['आइत', 'सोम', 'मंगल', 'बुध', 'बिही', 'शुक्र', 'शनि'])
        : gregorian.weekdayShort;
      labels.forEach(function (l) { row.appendChild(el('div', 'ndrp-weekday', { text: l })); });
      return row;
    }

    function renderGrid(state, controller) {
      var adapter = controller.getAdapter();
      var cells = state.mode === 'BS' ? buildBsMonthCells(adapter, state.viewYear, state.viewMonth) : buildAdMonthCells(adapter, state.viewYear, state.viewMonth);
      var grid = el('div', 'ndrp-grid');
      var today = controller.getToday();
      var previewRange = (state.pendingStart && state.hoverDate) ? createDateRange(state.pendingStart, state.hoverDate) : state.range;

      cells.forEach(function (cell) {
        if (!cell) { grid.appendChild(el('div', 'ndrp-cell ndrp-cell--empty')); return; }
        var classes = ['ndrp-cell'];
        if (isSameDay(cell, today)) classes.push('is-today');
        if (previewRange && isWithinRange(previewRange, cell)) classes.push('is-in-range');
        if (previewRange && isSameDay(cell, previewRange.start)) classes.push('is-range-start');
        if (previewRange && isSameDay(cell, previewRange.end)) classes.push('is-range-end');
        if (state.pendingStart && isSameDay(cell, state.pendingStart)) classes.push('is-pending-start');

        var btn = el('button', classes.join(' '), { type: 'button' });
        var primary = state.mode === 'BS' ? adapter.toDevanagariDigits(cell.bsDay) : String(cell.adDate.getDate());
        var secondary = state.mode === 'BS' ? String(cell.adDate.getDate()) : adapter.toDevanagariDigits(cell.bsDay);
        btn.appendChild(el('span', 'ndrp-cell-primary', { text: primary }));
        btn.appendChild(el('span', 'ndrp-cell-secondary', { text: secondary }));
        btn.addEventListener('click', function () { controller.selectDay(cell); });
        btn.addEventListener('mouseenter', function () { controller.hoverDay(cell); });
        grid.appendChild(btn);
      });
      return grid;
    }

    function renderPanel(root, controller, onApply) {
      var state = controller.getState();
      var adapter = controller.getAdapter();
      root.innerHTML = '';

      var panel = el('div', 'ndrp-panel');
      panel.appendChild(renderPresets(state, controller.getPresets(), controller));

      var calCol = el('div', 'ndrp-cal-col');
      calCol.appendChild(renderInputsRow(state, controller));
      calCol.appendChild(renderCalendarHeader(state, controller));
      calCol.appendChild(renderWeekdays(state, adapter));
      calCol.appendChild(renderGrid(state, controller));

      var applyBtn = el('button', 'ndrp-apply', { type: 'button', text: 'APPLY' });
      applyBtn.addEventListener('click', function () { controller.apply(onApply); });
      calCol.appendChild(applyBtn);

      panel.appendChild(calCol);
      root.appendChild(panel);
    }

    /* =========================================================================
     * MOUNT — call this once per picker instance. This is the "component API".
     * ===================================================================== */
    function mountNepaliDateRangePicker(container, options) {
      options = options || {};
      var adapter = options.adapter || createNepaliFunctionsAdapter();
      var controller = createController(adapter);

      var wrapper = el('div', 'ndrp');
      var trigger = el('button', 'ndrp-trigger', { type: 'button' });
      var panelRoot = el('div', 'ndrp-panel-root');
      panelRoot.style.display = 'none';
      wrapper.appendChild(trigger);
      wrapper.appendChild(panelRoot);
      container.appendChild(wrapper);

      function triggerLabel() {
        var state = controller.getState();
        if (!state.range) return 'Select date range';
        return formatDate(state.range.start, state.mode) + '   \u2192   ' + formatDate(state.range.end, state.mode);
      }

      function rerender() {
        var state = controller.getState();
        trigger.textContent = triggerLabel();
        panelRoot.style.display = state.isOpen ? 'block' : 'none';
        if (state.isOpen) {
          renderPanel(panelRoot, controller, function (range) {
            if (typeof options.onApply === 'function') options.onApply(range);
            container.dispatchEvent(new CustomEvent('ndrp:apply', { detail: { range: range }, bubbles: true }));
          });
        } else {
          panelRoot.innerHTML = '';
        }
      }

      controller.onChange(rerender);
      trigger.addEventListener('click', function () {
        controller.getState().isOpen ? controller.close() : controller.open();
      });
      document.addEventListener('click', function (evt) {
        if (!wrapper.contains(evt.target)) controller.close();
      }, true);

      rerender();
      return controller;
    }

    // Expose a minimal public API for manual mounting / testing.
    window.NepaliDateRangePicker = {
      mount: mountNepaliDateRangePicker,
      config: NDRP_CONFIG,
    };

    document.addEventListener('DOMContentLoaded', function () {
      mountNepaliDateRangePicker(document.getElementById('my-date-range-picker'), {
        onApply: function (range) { console.log('Range applied:', range); },
      });
    });
  })();
  </script>
</body>
