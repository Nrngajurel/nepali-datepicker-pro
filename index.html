<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nepali Datepicker Pro — Documentation</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #eef1f0;
      --panel: #ffffff;
      --panel-2: #f6f8f7;
      --ink: #1b2420;
      --ink-soft: #55635c;
      --ink-faint: #8a9891;
      --line: #dde4e0;
      --brand: #2f8f4e;
      --brand-ink: #1c6b38;
      --code-bg: #0f1613;
      --code-ink: #d7e4dc;
      --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Devanagari", Arial, sans-serif;
      --topbar-h: 57px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e1412;
        --panel: #161d1a;
        --panel-2: #121815;
        --ink: #e6efe9;
        --ink-soft: #9db0a7;
        --ink-faint: #6b7d74;
        --line: #253029;
        --brand: #4bbf72;
        --brand-ink: #7ad598;
        --code-bg: #0b1210;
        --code-ink: #cfe0d7;
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.55 var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--brand-ink);
    }

    /* ---- top bar ---------------------------------------------------------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 15.5px;
      white-space: nowrap;
    }

    .brand .mark {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(150deg, var(--brand), var(--brand-ink));
      color: #fff;
      font: 800 13px var(--sans);
    }

    .brand .accent {
      color: var(--brand);
    }

    .ver {
      font: 600 11px var(--mono);
      color: var(--ink-soft);
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 3px 8px;
      border-radius: 999px;
    }

    .topbar .spacer {
      margin-left: auto;
    }

    .menu-btn {
      display: none;
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 15px;
    }

    /* ---- framework switch (top bar + inline) ------------------------------ */
    .fw-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .fw-label {
      font: 700 10.5px/1 var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-faint);
    }

    .fw-tabs {
      display: flex;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }

    .fw-tabs button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--ink-soft);
      font: 600 12.5px var(--sans);
      padding: 6px 11px;
      border-radius: 7px;
      cursor: pointer;
    }

    .fw-tabs button[aria-selected="true"] {
      background: var(--brand);
      color: #fff;
    }

    /* ---- layout ----------------------------------------------------------- */
    .layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      max-width: 1220px;
      margin: 0 auto;
    }

    .sidebar {
      position: sticky;
      top: var(--topbar-h);
      align-self: start;
      height: calc(100vh - var(--topbar-h));
      overflow-y: auto;
      padding: 26px 14px 60px;
      border-right: 1px solid var(--line);
    }

    .nav-group+.nav-group {
      margin-top: 22px;
    }

    .nav-title {
      font: 700 10.5px var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--ink-faint);
      padding: 0 10px 8px;
    }

    .sidebar a {
      display: block;
      text-decoration: none;
      color: var(--ink-soft);
      font-size: 13.5px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .sidebar a:hover {
      background: var(--panel-2);
      color: var(--ink);
    }

    .sidebar a.active {
      background: color-mix(in srgb, var(--brand) 15%, transparent);
      color: var(--brand-ink);
      font-weight: 700;
    }

    .backdrop {
      display: none;
    }

    .content {
      padding: 36px 44px 120px;
      max-width: 900px;
      width: 100%;
    }

    /* ---- doc sections ----------------------------------------------------- */
    .doc-section {
      scroll-margin-top: calc(var(--topbar-h) + 16px);
    }

    .doc-section+.doc-section {
      margin-top: 52px;
      padding-top: 46px;
      border-top: 1px solid var(--line);
    }

    .sec-eyebrow {
      font: 700 11px var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--brand);
      margin: 0 0 8px;
    }

    .sec-title {
      font-size: 27px;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      line-height: 1.1;
    }

    .sec-lead {
      margin: 0 0 20px;
      color: var(--ink-soft);
      font-size: 15.5px;
      max-width: 66ch;
    }

    .prose {
      color: var(--ink-soft);
      font-size: 14.5px;
    }

    .prose p {
      margin: 0 0 12px;
    }

    .prose strong {
      color: var(--ink);
    }

    .prose code {
      font: 500 12.5px var(--mono);
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 1px 6px;
      border-radius: 6px;
      color: var(--brand-ink);
      white-space: nowrap;
    }

    .prose ul {
      margin: 0 0 12px;
      padding-left: 18px;
    }

    .prose li {
      margin: 5px 0;
    }

    .sub {
      font-size: 15px;
      font-weight: 700;
      margin: 24px 0 10px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    /* ---- standalone code blocks ------------------------------------------ */
    .code-block {
      position: relative;
      margin: 14px 0;
    }

    .code-block pre {
      margin: 0;
      overflow-x: auto;
      background: var(--code-bg);
      color: var(--code-ink);
      padding: 16px 18px;
      border-radius: 12px;
      font: 500 12.5px/1.65 var(--mono);
    }

    .code-block .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    /* ---- hero ------------------------------------------------------------- */
    .hero {
      padding: 6px 0 8px;
    }

    .hero-title {
      margin: 0 0 14px;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.03;
      letter-spacing: -0.03em;
      font-weight: 800;
      text-wrap: balance;
    }

    .hero-title span {
      color: var(--brand);
    }

    .hero-sub {
      margin: 0 0 22px;
      max-width: 62ch;
      color: var(--ink-soft);
      font-size: 16px;
    }

    .install {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--code-bg);
      color: var(--code-ink);
      font: 500 14px var(--mono);
      padding: 11px 14px;
      cursor: pointer;
    }

    .install .dollar {
      color: var(--brand);
    }

    .install .copyhint {
      font-size: 11px;
      color: var(--ink-faint);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      padding-left: 10px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .hero-badges span {
      font: 600 11px var(--mono);
      color: var(--ink-soft);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 11px;
    }

    /* ---- feature grid ----------------------------------------------------- */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .feature {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 16px 16px 15px;
    }

    .feature h4 {
      margin: 0 0 5px;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .feature p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ---- component card (live playground) --------------------------------- */
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      overflow: hidden;
      margin-top: 6px;
    }

    .card>header {
      padding: 18px 20px 6px;
    }

    .card>header h2 {
      margin: 0 0 3px;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .card>header p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 13.5px;
    }

    .card-body {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 0;
    }

    @media (max-width: 820px) {
      .card-body {
        grid-template-columns: 1fr;
      }
    }

    .preview,
    .options {
      padding: 18px 20px;
    }

    .preview {
      border-right: 1px solid var(--line);
    }

    @media (max-width: 820px) {
      .preview {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    .preview .field {
      display: grid;
      gap: 8px;
    }

    .preview label {
      font-weight: 700;
      font-size: 13px;
    }

    .preview .result {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 9px;
      min-height: 20px;
      background: var(--panel-2);
      border: 1px dashed var(--line);
      font: 500 12.5px var(--mono);
      color: var(--ink-soft);
      word-break: break-word;
    }

    .opt-section-title {
      font: 700 11px/1 var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }

    .opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
    }

    .opt+.opt {
      border-top: 1px solid var(--line);
    }

    .opt label {
      font-size: 13.5px;
      font-weight: 600;
    }

    .opt .hint {
      display: block;
      font-weight: 400;
      color: var(--ink-faint);
      font-size: 11.5px;
    }

    .opt.is-disabled {
      opacity: 0.42;
      pointer-events: none;
    }

    .opt input[type="text"],
    .opt input[type="number"],
    .opt select {
      font: inherit;
      font-size: 13px;
      padding: 6px 8px;
      min-width: 120px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
    }

    .opt input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--brand);
    }

    .snippet {
      border-top: 1px solid var(--line);
    }

    .snippet-body {
      position: relative;
    }

    .snippet-body pre {
      margin: 0;
      overflow-x: auto;
      background: var(--code-bg);
      color: var(--code-ink);
      padding: 16px 18px;
      font: 500 12.5px/1.6 var(--mono);
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.08);
      color: #dfeee6;
      font: 600 12px var(--sans);
      padding: 5px 10px;
      cursor: pointer;
      z-index: 2;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .copy-btn.copied {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .preview .ndp-trigger {
      width: 100%;
    }

    .foot {
      color: var(--ink-faint);
      font-size: 12.5px;
      margin-top: 56px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    /* ---- responsive ------------------------------------------------------- */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .menu-btn {
        display: inline-flex;
      }

      .topbar .fw-label {
        display: none;
      }

      .sidebar {
        position: fixed;
        top: var(--topbar-h);
        left: 0;
        bottom: 0;
        width: 264px;
        z-index: 25;
        background: var(--panel);
        transform: translateX(-100%);
        transition: transform 0.22s ease;
        height: auto;
      }

      .sidebar.open {
        transform: none;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      }

      .backdrop.show {
        display: block;
        position: fixed;
        inset: var(--topbar-h) 0 0 0;
        z-index: 24;
        background: rgba(0, 0, 0, 0.32);
      }

      .content {
        padding: 26px 18px 90px;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/playground/main.ts"></script>
</body>

</html>
