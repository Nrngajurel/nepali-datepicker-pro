name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint           # tsc --noEmit
      - run: npm test               # vitest: engine correctness + DOM/mount tests
      - run: npm run build          # vite library build (ES + UMD + types)
